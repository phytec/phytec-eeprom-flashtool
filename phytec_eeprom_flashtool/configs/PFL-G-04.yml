# product: PFL-G-04 / phyFLEX-STM32MP2x FPSC

PHYTEC:
  eeprom_offset: 0x0
  i2c_bus: 0x2
  i2c_dev: 0x50
  api: 3
  extended_options: 2
  max_image_size: 2048
  optiontree_rev: 0

Kit:
  0: Processor
  1: Frequency and Crypto
  2: DDR-Ram
  3: eMMC
  4: Ethernet
  5: RTC / Pinout PCIe/USB3ss
  6: Temperature
  7: IO Voltage / Temperature Sensor
  8: EEPROM
Processor:
  '0': Single Core MP231
  '1': Single Core MP251
  '2': Dual Core MP233
  '3': Dual Core MP253
  '4': Dual Core MP235
  '5': Dual Core MP255
  '7': Dual Core MP257
Frequency and Crypto:
  A: 1.2 GHz no Crypto
  C: 1.2 GHz Crypto
  D: 1.5 GHz no Crypto
  F: 1.5 GHz Crypto
DDR-Ram:
  '0': 0.5 GB x 32
  '1': 1 GB x 32
  '2': 2 GB x 32
  '3': 4 GB x 32
  '4': 0.5 GB x 16
  '5': 1 GB x 16
  '6': 2 GB x 16
eMMC:
  '0': '-'
  '1': 4 GB (MLC)
  '2': 8 GB (MLC)
  '3': 16 GB (MLC)
  '4': 32 GB (TLC)
  '5': 64 GB (TLC)
  '6': 128 GB (TLC)
  '7': 256 GB (TLC)
Ethernet:
  '0': '-'
  '1': Gbit Ethernet Phy
RTC / Pinout PCIe/USB3ss:
  '0': External RTC / FPSC PCIe
  '1': External RTC / FPSC USB3ss
  '2': '- / FPSC PCIe'
  '3': '- / FPSC USB3ss'
Temperature:
  C: Consumer Temp
  I: Industrial Temp
IO Voltage / Temperature Sensor:
  '0': 1.8 V / -
  '1': 1.8 V / Temperature Sensor
  '2': 3.3 V / -
  '3': 3.3 V / Temperature Sensor
EEPROM:
  '0': 4 kB
  '2': 32 kB
